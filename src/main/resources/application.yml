server:
  port: 8080

spring:
  application:
    name: assessarc-backend
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 14MB
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  jackson:
    default-property-inclusion: NON_NULL

# ── AssessArc Config ──
assessarc:
  gemini:
    # Previous direct Gemini API configuration kept for rollback/reference:
    # api-key: ${GEMINI_API_KEYS}
    # url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent
    vertex:
      enabled: true
      project-id: ${VERTEX_AI_PROJECT_ID}
      location: ${VERTEX_AI_LOCATION}
      model: ${VERTEX_AI_MODEL}
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS}

  firebase:
    service-account-path: file:/etc/secrets/firebase-service-account.json

  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    account-number: ${RAZORPAY_ACCOUNT_NUMBER}
  admin:
    allowed-emails: ashish9145826@gmail.com
    allowed-uids: mUURcbQZkvhmuBHWRPIBvfswTsa2
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://www.assessarc.com
      - https://assessarc.com
      - https://assessarcapp.onrender.com
      - https://auth.assessarc.com
      - https://assessarc.app
      - https://www.assessarc.app

  wallet:
    signup-bonus: 10
    price-30min: 10
    price-60min: 15

logging:
  level:
    com.assessarc: DEBUG
    org.springframework.security: WARN
    org.springframework.web: WARN
